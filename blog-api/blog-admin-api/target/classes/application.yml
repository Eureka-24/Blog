server:
  port: 8081

spring:
  application:
    name: blog-admin-api
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:blog}
    username: ${DB_USER:blog}
    password: ${DB_PASS:blog123}
    driver-class-name: org.postgresql.Driver
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}
      database: 0

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.blog: debug

# Meilisearch 搜索引擎配置
meilisearch:
  host: ${MEILI_HOST:http://localhost:7700}
  api-key: ${MEILI_MASTER_KEY:blogSearchKey}
  index-name: articles

# 文件上传配置
app:
  upload:
    path: /uploads/images
    thumbnail:
      width: 300
      height: 200

# 文件上传大小限制
spring.servlet.multipart.max-file-size: 5MB
spring.servlet.multipart.max-request-size: 20MB

# JWT 配置
jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForDevelopmentOnlyChangeInProduction}
  expiration: 2592000000  # 30天，单位毫秒
