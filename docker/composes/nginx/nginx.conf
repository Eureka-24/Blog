events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # 上游服务 - 规则3：通过 proxy-net 访问各服务
    upstream web_api {
        server web-api:8080;
    }

    upstream admin_api {
        server admin-api:8081;
    }

    upstream landing {
        server blog-landing:3002;
    }

    upstream blog_web {
        server blog-web:3000;
    }

    # HTTP 服务
    server {
        listen 80;
        server_name _;

        # 规则4：导航页（根路径）- SSR 服务代理
        location / {
            proxy_pass http://landing;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 规则4：博客前台（/blog 路径）- Next.js SSR 服务代理
        # 注意：Next.js 配置了 basePath: '/blog'，需要保留 /blog 前缀
        location /blog/ {
            proxy_pass http://blog_web/blog/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 博客前台的静态资源
        location /blog/_next/ {
            proxy_pass http://blog_web/blog/_next/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # 博客前台的其他静态资源（如 favicon）
        location /blog/favicon.ico {
            proxy_pass http://blog_web/blog/favicon.ico;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 规则4：后台管理（/blog/admin 路径）- 纯静态文件直接服务
        # blog-admin 是 Vite SPA，不运行容器，由 Nginx 直接托管静态文件
        location /blog/admin/ {
            alias /usr/share/nginx/html/admin/;
            try_files $uri $uri/ /blog/admin/index.html;
        }

        # 后台管理的静态资源
        location /blog/admin/assets/ {
            alias /usr/share/nginx/html/admin/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # 后台管理的其他静态资源（如 favicon）
        location /blog/admin/favicon.svg {
            alias /usr/share/nginx/html/admin/favicon.svg;
        }

        location /blog/admin/icons.svg {
            alias /usr/share/nginx/html/admin/icons.svg;
        }

        # 前台 API
        location /blog/api/ {
            proxy_pass http://web_api/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 后台 API
        location /blog/api/admin/ {
            proxy_pass http://admin_api/api/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 上传的图片文件服务
        location /uploads/ {
            alias /uploads/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            # 允许跨域访问图片
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
        }
    }
}
