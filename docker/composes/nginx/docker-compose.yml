version: '3.8'

# 规则3：【统一入口】创建唯一的"代理网络"
# 规则4：【静态资源策略】纯静态前端不运行容器，构建产物挂载到 Nginx
# 启动顺序: infra -> nginx -> landing -> blog

services:
  # Nginx 网关 - 唯一入口
  nginx:
    image: nginx:alpine
    container_name: nginx-gateway
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
      - ../../uploads:/uploads
      # 规则4：挂载纯静态前端构建产物（Vite SPA）
      # 注意：需要先构建 blog-admin 静态文件到该路径
      # 构建命令: cd blog-system && docker build -f docker/composes/blog/Dockerfile.admin-static -t blog-admin-static .
      - ../../../blog-admin/dist:/usr/share/nginx/html/admin:ro
    ports:
      - "80:80"
      - "443:443"
    # 规则3：Nginx 只需要加入 proxy-net
    networks:
      - proxy-net
    restart: unless-stopped

networks:
  # 规则3：统一代理网络
  proxy-net:
    name: proxy-net
    driver: bridge
